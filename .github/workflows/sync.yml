name: Sync to hzr12.github.io

on:
  push:
    branches: [dev]
    paths:
      - 'index.html'
      - 'css/**'
      - 'js/**'
      - 'assets/**'

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout circlemap
        uses: actions/checkout@v4
        with:
          path: circlemap

      - name: Checkout hzr12.github.io
        uses: actions/checkout@v4
        with:
          repository: hzr12/hzr12.github.io
          token: ${{ secrets.SYNC_TOKEN }}
          path: site

      - name: Sync files
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'AGENTS.md' \
            --exclude 'CHANGELOG.md' \
            --exclude 'README.md' \
            --exclude 'LICENSE' \
            circlemap/ site/circlemap/

      - name: Commit and push
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: circlemap ${{ github.sha }}"
            git push
          fi
