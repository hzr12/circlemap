<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>й¬јжҠ“дәәвҖ”вҖ”ең°еӣҫйӣ·иҫ?/title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="map">
    <canvas id="circle-canvas"></canvas>
  </div>

  <!-- жө®еҠЁжҺ§еҲ¶жҢүй’®з»?-->
  <div class="floating-buttons">
    <button id="gps-btn" class="fab-btn" title="е®ҡдҪҚеҲ°жҲ‘зҡ„дҪҚзҪ? aria-label="е®ҡдҪҚ">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
      <span class="pulse-ring"></span>
    </button>
  </div>

  <!-- еә•йғЁжҺ§еҲ¶йқўжқҝ -->
  <div class="bottom-panel" id="bottomPanel">
    <div class="panel-handle">
      <div class="handle-bar"></div>
    </div>

    <!-- GPS зҠ¶жҖҒжқЎ -->
    <div class="gps-status" id="gps-status">
      <span class="gps-dot"></span>
      <span class="gps-offline">вҠ?жңӘе®ҡдҪҚпјҢзӮ№еҮ» GPS жҢүй’®е®ҡдҪҚ</span>
    </div>

    <div class="panel-header">
      <h1 class="panel-title">й¬јжҠ“дәәвҖ”вҖ”ең°еӣҫйӣ·иҫ?/h1>
    </div>

    <div class="panel-body">
      <!-- жЁЎејҸеҲҮжҚў -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="click" id="mode-click">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          зӮ№еҮ»йҖүзӮ№
        </button>
        <button class="mode-tab" data-mode="input" id="mode-input">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M12 8v8M8 12h8"/>
          </svg>
          иҫ“е…Ҙеқҗж Ү
        </button>
      </div>

      <!-- еқҗж Үиҫ“е…ҘеҢ?-->
      <div class="input-section input-group" id="inputGroup">
        <div class="coord-row">
          <div class="coord-field">
            <label for="lat" class="field-label">зә¬еәҰ</label>
            <div class="input-wrap">
              <input type="number" id="lat" class="coord-input" step="any" placeholder="39.916527" inputmode="decimal">
            </div>
          </div>
          <div class="coord-field">
            <label for="lng" class="field-label">з»ҸеәҰ</label>
            <div class="input-wrap">
              <input type="number" id="lng" class="coord-input" step="any" placeholder="116.397128" inputmode="decimal">
            </div>
          </div>
        </div>
      </div>

      <!-- зӮ№еҮ»жҸҗзӨә -->
      <div class="click-hint" id="clickHint">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13s-7-8-7-13a7 7 0 0 1 14 0Z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        зӮ№еҮ»ең°еӣҫдёҠзҡ„д»»ж„ҸдҪҚзҪ®йҖүжӢ©дёӯеҝғзӮ?
      </div>

      <!-- жҷәиғҪеқҗж Үи§Јжһҗ -->
      <div class="parse-section">
        <div class="parse-row">
          <div class="parse-input-wrap">
            <input type="text" id="parse-input" class="parse-input" placeholder="зІҳиҙҙеқҗж ҮпјҢеҰӮпј?3.1291, 113.2644" enterkeyhint="done">
          </div>
        </div>
      </div>

      <!-- еҚҠеҫ„и®ҫзҪ® -->
      <div class="radius-section">
        <div class="radius-header">
          <label class="field-label">еҚҠеҫ„</label>
          <div class="radius-value-wrap">
            <input type="number" id="radius-input" class="radius-input" value="5000" min="1" max="50000" inputmode="numeric">
            <span class="radius-unit">зұ?/span>
          </div>
        </div>
        <div class="slider-wrap">
          <input type="range" id="radius-slider" class="radius-slider" min="1" max="50000" value="5000" step="1">
          <div class="slider-labels">
            <span>1m</span>
            <span>500m</span>
            <span>1km</span>
            <span>10km</span>
            <span>50km</span>
          </div>
        </div>
      </div>

      <!-- ж“ҚдҪңжҢүй’® -->
      <div class="action-row">
        <button id="draw-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="6"/>
            <circle cx="12" cy="12" r="2"/>
          </svg>
          з»ҳеҲ¶еңҶеҪў
        </button>
        <button id="clear-btn" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          жё…йҷӨ
        </button>
      </div>

      <!-- иҪЁиҝ№и®°еҪ• -->
      <div class="trail-section">
        <div class="trail-header">
          <span class="field-label">иҪЁиҝ№и®°еҪ•</span>
          <span class="trail-distance" id="trail-distance">0m</span>
        </div>
        <div class="trail-controls">
          <button id="trail-record-btn" class="btn btn-trail">
            <span class="trail-dot"></span> ејҖе§Ӣи®°еҪ?
          </button>
          <button id="trail-clear-btn" class="btn btn-secondary btn-sm" disabled>жё…йҷӨ</button>
          <button id="trail-export-btn" class="btn btn-secondary btn-sm" disabled>еҜјеҮә GPX</button>
        </div>
      </div>

      <!-- еңҶеҲ—иЎ?-->
      <div class="circle-list-section">
        <div class="circle-list-header">
          <span class="field-label">е·Із»ҳеҲ?(<span id="circle-count">0</span>)</span>
        </div>
        <div class="circle-list" id="circle-list">
          <div class="empty-state">жҡӮж— еҗҢеҝғеңҶпјҢзӮ№еҮ»гҖҢз»ҳеҲ¶еңҶеҪўгҖҚж·»еҠ?/div>
        </div>
      </div>

      <!-- жңҖиҝ‘е®ҡдҪ?-->
      <div class="fix-list-section">
        <div class="fix-list-header">
          <span class="field-label">жңҖиҝ‘е®ҡдҪ?(<span id="fix-count">0</span>)</span>
        </div>
        <div class="fix-list" id="fix-list">
          <div class="empty-state">жҡӮж— е®ҡдҪҚж•°жҚ®</div>
        </div>
      </div>

      <!-- дҝЎжҒҜеұ•зӨәеҢ?-->
      <div class="info-area hidden" id="infoArea">
        <div class="info-divider"></div>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">еңҶеҝғеқҗж Ү</span>
            <span class="info-value" id="info-center" style="cursor:pointer" title="зӮ№еҮ»еӨҚеҲ¶еқҗж Ү">--</span>
          </div>
          <div class="info-item">
            <span class="info-label">еҚҠеҫ„</span>
            <span class="info-value" id="info-radius">--</span>
          </div>
          <div class="info-item">
            <span class="info-label">йқўз§Ҝ</span>
            <span class="info-value accent" id="info-area">--</span>
          </div>
          <div class="info-item">
            <span class="info-label">еҗҢеҝғең?/span>
            <span class="info-value" id="info-rings">--</span>
          </div>
          <div class="info-item info-item-dist">
            <span class="info-label">и·қжҲ‘дҪҚзҪ®</span>
            <span class="info-value" id="info-distance">--</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tencent Map API -->
  <script charset="utf-8" src="https://map.qq.com/api/js?v=2.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77"></script>

  <!-- еә”з”Ёи„ҡжң¬ -->
  <script src="js/config.js?t=20260628v9"></script>
  <script src="js/map.js?t=20260628v9"></script>
  <script src="js/gps.js?t=20260628v9"></script>
  <script src="js/app.js?t=20260628v9"></script>
</body>
</html>
